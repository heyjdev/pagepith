<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page to Markdown</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div><h1>Page to Markdown</h1><p>Clean, local extraction for agents and LLMs.</p></div>
    <button id="refresh" class="icon-button" type="button" title="Extract again" aria-label="Extract again">↻</button>
  </header>
  <div id="status" role="status" aria-live="polite" class="status">Extracting current page…</div>
  <textarea id="preview" aria-label="Markdown preview" spellcheck="false" placeholder="Markdown will appear here"></textarea>
  <div class="actions">
    <button id="copy" type="button" disabled>Copy Markdown</button>
    <button id="export" type="button" disabled>Export .md</button>
  </div>
  <p class="privacy">Runs entirely in this tab. Nothing is sent anywhere.</p>
  <script src="popup.js"></script>
</body>
</html>
